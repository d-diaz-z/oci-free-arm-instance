name: Try to Create OCI VM
# Scheduled every 5 minutes, but GitHub throttles scheduled workflows,
# so in practice it fires roughly every 1-2 hours.
on:
  schedule:
    - cron: "*/5 * * * *"
  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:

# actions: write lets the workflow disable itself once the VM is created,
# so it never tries to provision a second one.
permissions:
  contents: read
  actions: write

env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.IMAGE_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: ${{ secrets.AD_NAME }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  # The Always Free A1 allowance is 2 OCPUs / 12 GB total across ALL A1
  # instances in the tenancy (halved from 4/24 by Oracle on 2026-06-15).
  # x86 shapes (VM.Standard.E2.1.Micro) don't count against it.
  # If you upgrade the account to Pay As You Go, you can likely raise this
  # back to 4 / 24.
  OCPUS: "2"
  MEMORY_GB: "12"
  # Always Free block storage is 200 GB total for the whole tenancy, shared
  # with every other boot volume in the account (openwa-server uses 47 GB).
  BOOT_VOLUME_GB: "150"
  DISPLAY_NAME: "coolify-vm"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI and Try to Create VM
        id: create_vm
        run: |
          set -o pipefail

          pip install oci-cli

          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "region=${{ env.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

          # Always Free A1 instances can be launched in ANY availability domain
          # of the home region, so try them all instead of pinning one.
          # Falls back to the AD_NAME secret if the list call fails.
          ADS=$(oci iam availability-domain list --compartment-id "$COMPARTMENT_ID" 2>/dev/null | jq -r '.data[].name' || true)
          if [ -z "$ADS" ]; then
            ADS="$AD_NAME"
          fi
          if [ -z "$ADS" ]; then
            echo "No availability domain available (AD list failed and AD_NAME secret is empty)."
            STATUS=fatal
          else
            STATUS=capacity
          fi

          OCI_OUTPUT=""
          for AD in $ADS; do
            echo "--- Trying availability domain: $AD ---"
            OCI_OUTPUT=$(oci compute instance launch \
              --compartment-id "$COMPARTMENT_ID" \
              --availability-domain "$AD" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY_GB}" \
              --subnet-id "$SUBNET_ID" \
              --image-id "$IMAGE_ID" \
              --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
              --assign-public-ip true \
              --display-name "$DISPLAY_NAME" \
              --boot-volume-size-in-gbs "$BOOT_VOLUME_GB" 2>&1 || true)
            echo "$OCI_OUTPUT"

            if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
              STATUS=success
              break
            elif echo "$OCI_OUTPUT" | grep -qiE 'Out of host capacity|TooManyRequests|InternalError|timed out|Connection aborted|ConnectionError|Max retries exceeded|ServiceUnavailable|RequestException'; then
              # Transient: no free A1 hosts in this AD right now, or a network
              # hiccup reaching the OCI endpoint. Try the next AD / next run.
              STATUS=capacity
            else
              # Anything else (QuotaExceeded, LimitExceeded, InvalidParameter,
              # auth errors, ...) is tenancy-wide and retrying won't fix it.
              STATUS=fatal
              break
            fi
          done

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          {
            echo "log_data<<OCI_LOG_EOF"
            echo "$OCI_OUTPUT"
            echo "OCI_LOG_EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "### OCI VM creation attempt: **$STATUS**"
            echo '```json'
            echo "$OCI_OUTPUT"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Send Discord Notification
        # Change 'false' to: always() && steps.create_vm.outputs.status != 'capacity'
        # to get pinged only on success or on a fatal error.
        if: false
        uses: sarisia/actions-status-discord@v1.15.4
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ack_no_webhook: true
          title: "OCI VM Status: ${{ steps.create_vm.outputs.status }}"
          status: ${{ steps.create_vm.outputs.status == 'success' && 'success' || 'failure' }}
          color: ${{ steps.create_vm.outputs.status == 'success' && '0x28a745' || '0xdc3545' }}
          description: |
            Attempt to create A1.Flex VM.
            **Status:** `${{ steps.create_vm.outputs.status }}`

            **Log Output:**
            ```json
            ${{ steps.create_vm.outputs.log_data }}
            ```

      - name: Evaluate result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ steps.create_vm.outputs.status }}" in
            success)
              echo "VM created! Disabling this workflow so it does not create another one."
              gh workflow disable "create-vm.yml" --repo "${{ github.repository }}"
              ;;
            capacity)
              echo "Out of host capacity in every availability domain. Will retry on the next scheduled run."
              ;;
            *)
              echo "Fatal (non-retryable) error from OCI - see the log above. Failing the job so it shows up red."
              exit 1
              ;;
          esac
